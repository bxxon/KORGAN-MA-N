name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python sources
        run: python -m py_compile scripts/ort_worker.py tests/test_runtime_files.py

      - name: Run config and manifest tests
        run: python -m unittest discover -s tests -p "test_*.py"
